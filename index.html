<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Name Picker</title>
    <link rel="manifest" href="data:application/json;base64,ewogICJkZWZhdWx0X2xvY2FsZSI6ICJlbiIsCiAgIm5hbWUiOiAiTmFtZSBQaWNrZXIiLAogICJzaG9ydF9uYW1lIjogIlBpY2tlciIsCiAgImRlc2NyaXB0aW9uIjogIkEgY2xhc3Nyb29tIHdoZWVsIHBpY2tlciIsCiAgInN0YXJ0X3VybCI6ICIuIiwKICAiZGlzcGxheSI6ICJzdGFuZGFsb25lIiwKICAiYmFja2dyb3VuZF9jb2xvciI6ICIjZjRkNTRmIiwKICAidGhlbWVfY29sb3ciOiAiIzM0OThkYiIKfQ==">
    
    <style>
        :root {
            --primary: #3498db; --dark: #2c3e50; --success: #2ecc71; --error: #e74c3c;
            --gray: #ecf0f1; --white: #ffffff; --text-main: #2c3e50; --text-light: #7f8c8d;
            --bg-app: #f0f2f5; --sidebar-border: #eeeeee; --item-bg: #fafafa;
        }

        body.dark-mode {
            --dark: #ecf0f1; --white: #2c2c2c; --text-main: #f0f2f5; --text-light: #bdc3c7;
            --bg-app: #1a1a1a; --sidebar-border: #444444; --item-bg: #1e1e1e; --gray: #3d3d3d;
        }

        body {
            font-family: 'Segoe UI', sans-serif; background-color: var(--bg-app);
            color: var(--text-main); margin: 0; padding: 10px;
            height: 100vh; width: 100vw; overflow: hidden;
            display: flex; justify-content: center; align-items: center; box-sizing: border-box;
        }

        .container {
            background: var(--white); border-radius: 24px; box-shadow: 0 10px 50px rgba(0,0,0,0.3);
            width: 100%; height: 100%; max-width: 1200px;
            display: flex; overflow: hidden; position: relative;
        }

        /* --- SIDEBAR: SELF-CONTAINED --- */
        .sidebar {
            width: 300px; min-width: 300px; border-right: 1px solid var(--sidebar-border);
            display: flex; flex-direction: column; height: 100%;
            padding: 20px; box-sizing: border-box; transition: width 0.5s, min-width 0.5s, opacity 0.5s;
        }
        .sidebar.collapsed { width: 0; min-width: 0; padding: 0; opacity: 0; border: none; pointer-events: none; }

        .sidebar-header { flex-shrink: 0; }
        .input-group { display: flex; flex-direction: column; gap: 8px; margin: 15px 0; }
        input[type="text"] {
            padding: 12px; border: 2px solid var(--gray); border-radius: 8px; outline: none;
            background: var(--item-bg); color: var(--text-main);
        }
        .add-btn { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        .list-container { 
            flex-grow: 1; overflow-y: auto; border: 1px solid var(--gray); 
            border-radius: 12px; background: var(--item-bg); margin-bottom: 15px;
        }
        .student-item { display: flex; align-items: center; justify-content: space-between; padding: 10px; border-bottom: 1px solid var(--sidebar-border); }

        .sidebar-footer { flex-shrink: 0; border-top: 1px solid var(--sidebar-border); padding-top: 10px; }
        .backup-row { display: flex; gap: 5px; margin-bottom: 5px; }
        .backup-btn { flex: 1; font-size: 0.75rem; padding: 8px; cursor: pointer; background: var(--gray); border: 1px solid var(--sidebar-border); border-radius: 6px; color: var(--text-main); font-weight: bold; }

        /* --- WHEEL SECTION: GRID SYSTEM --- */
        .wheel-box { 
            flex: 1; display: grid;
            grid-template-rows: auto 1fr auto; /* Row 1: Header, Row 2: Wheel, Row 3: Info */
            align-items: center; justify-items: center;
            height: 100%; min-width: 0; overflow-y: auto; padding: 20px; box-sizing: border-box;
        }

        .wheel-header { grid-row: 1; text-align: center; margin-bottom: 10px; }
        .wheel-header h1 { margin: 0; font-size: 1.5rem; }

        /* CIRCLE ENFORCEMENT */
        .canvas-wrapper { 
            grid-row: 2; position: relative;
            /* Key fix: Size is 80% of either height or width, whichever is smaller */
            width: min(70vh, 100%); 
            max-width: 500px;
            aspect-ratio: 1 / 1; 
            margin: auto;
        }
        
        #wheelCanvas {
            width: 100%; height: 100%; border-radius: 50%;
            transition: transform 10s cubic-bezier(0.1, 0, 0.1, 1);
            border: 8px solid var(--white); box-shadow: 0 0 30px rgba(0,0,0,0.1);
        }

        .arrow {
            position: absolute; top: -10px; left: 50%; transform: translateX(-50%);
            width: 0; height: 0; border-left: 15px solid transparent;
            border-right: 15px solid transparent; border-top: 30px solid var(--error);
            z-index: 110;
        }

        #spinBtn {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80px; height: 80px; border-radius: 50%; background: var(--dark);
            color: var(--white); border: 4px solid var(--white); font-weight: bold;
            cursor: pointer; z-index: 150; box-shadow: 0 6px 15px rgba(0,0,0,0.3);
        }

        #spinBtn:disabled { background: #95a5a6; }

        .info { grid-row: 3; font-size: 0.9rem; color: var(--text-light); margin-top: 15px; }

        /* Winner UI */
        #winnerOverlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.1); display: flex; align-items: center; justify-content: center;
            z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.5s;
        }
        #winnerOverlay.show { opacity: 1; pointer-events: auto; }
        #winnerName {
            background: var(--white); padding: 25px 50px; border-radius: 50px;
            box-shadow: 0 0 100px rgba(0,0,0,0.5); font-size: clamp(2rem, 5vw, 4rem);
            font-weight: 900; color: var(--success); cursor: pointer;
            animation: celebrate 0.5s infinite alternate;
        }
        @keyframes celebrate { from { transform: scale(1); } to { transform: scale(1.1); } }

        .controls-row { position: absolute; top: 15px; left: 15px; z-index: 200; }
        .toggle-btn { background: var(--dark); color: var(--white); border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body class="light-theme">

<div class="container">
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>Student List</h2>
            <p style="font-size: 0.8rem; color: var(--text-light);">Add names. List hides after 30s.</p>
            <div class="input-group">
                <input type="text" id="nameIn" placeholder="Names..." oninput="resetSidebarTimer()">
                <button class="add-btn" onclick="addName()">Add to Wheel</button>
            </div>
        </div>
        <div class="list-container" id="uiList" onscroll="resetSidebarTimer()"></div>
        <div class="sidebar-footer">
            <div class="backup-row">
                <button class="backup-btn" onclick="exportList()">💾 Export</button>
                <button class="backup-btn" onclick="document.getElementById('fileInput').click()">📂 Import</button>
            </div>
            <div class="backup-row">
                <button class="backup-btn" onclick="toggleTheme()">🌓 Theme</button>
                <button onclick="clearAll()" style="color:var(--error); background:none; border:none; text-decoration:underline; font-size:0.7rem; flex:1; cursor:pointer;">Clear All</button>
            </div>
        </div>
        <input type="file" id="fileInput" style="display:none" accept=".txt" onchange="importList(event)">
    </div>

    <div class="wheel-box">
        <div class="controls-row">
            <button class="toggle-btn" onclick="toggleSidebar()">☰ List</button>
        </div>
        <div class="wheel-header"><h1>Random Name Picker</h1></div>
        <div class="canvas-wrapper">
            <div class="arrow"></div>
            <button id="spinBtn" onclick="spin()">SPIN</button>
            <canvas id="wheelCanvas" width="1000" height="1000"></canvas>
        </div>
        <p class="info" id="poolStatus"></p>
    </div>
</div>

<div id="winnerOverlay" onclick="dismissWinner()"><div id="winnerName"></div></div>

<script>
    let masterList = JSON.parse(localStorage.getItem('picker_vFinal_vFinal')) || [];
    let isDarkMode = localStorage.getItem('picker_theme') === 'dark';
    let pool = []; let rotation = 0; let winnerTimer = null; let sidebarTimer = null;
    const colors = ['#3498db', '#9b59b6', '#e67e22', '#1abc9c', '#f1c40f', '#e74c3c', '#2c3e50'];

    const inputField = document.getElementById('nameIn');
    inputField.addEventListener("keydown", (e) => { if (e.key === "Enter") addName(); });

    function init() { 
        if (isDarkMode) document.body.classList.add('dark-mode');
        resetPool(); render(); resetSidebarTimer(); 
    }

    function toggleTheme() {
        isDarkMode = !isDarkMode; document.body.classList.toggle('dark-mode');
        localStorage.setItem('picker_theme', isDarkMode ? 'dark' : 'light'); draw();
    }

    function resetSidebarTimer() {
        if (sidebarTimer) clearTimeout(sidebarTimer);
        if (document.getElementById('sidebar').classList.contains('collapsed')) return;
        sidebarTimer = setTimeout(() => { toggleSidebar(); }, 30000);
    }

    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('collapsed');
        setTimeout(draw, 550);
    }

    function addName() {
        const val = inputField.value.trim(); if (!val) return;
        val.split(',').forEach(n => { if (n.trim()) masterList.push({ name: n.trim(), active: true }); });
        inputField.value = ''; resetPool(); render(); resetSidebarTimer();
    }

    function toggleActive(idx) { masterList[idx].active = !masterList[idx].active; resetPool(); render(); }
    function remove(idx) { masterList.splice(idx, 1); resetPool(); render(); }
    function clearAll() { if(confirm("Clear list?")) { masterList = []; resetPool(); render(); } }
    function exportList() {
        const blob = new Blob([masterList.map(s => s.name).join(', ')], {type: "text/plain"});
        const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "names.txt"; a.click();
    }
    function importList(e) {
        const reader = new FileReader();
        reader.onload = (ev) => {
            ev.target.result.split(',').forEach(n => { if (n.trim()) masterList.push({ name: n.trim(), active: true }); });
            resetPool(); render();
        };
        reader.readAsText(e.target.files[0]);
    }

    function resetPool() { pool = masterList.filter(s => s.active).map(s => s.name); }
    function render() {
        const listUI = document.getElementById('uiList'); listUI.innerHTML = '';
        masterList.forEach((s, i) => {
            listUI.innerHTML += `<div class="student-item"><span><input type="checkbox" ${s.active ? 'checked' : ''} onchange="toggleActive(${i})"> <span>${s.name}</span></span><button style="color:red; background:none; border:none; cursor:pointer;" onclick="remove(${i})">&times;</button></div>`;
        });
        localStorage.setItem('picker_vFinal_vFinal', JSON.stringify(masterList));
        draw(); document.getElementById('poolStatus').innerText = `Unpicked: ${pool.length} | Active: ${masterList.filter(s => s.active).length}`;
    }

    function draw() {
        const canvas = document.getElementById('wheelCanvas'); const ctx = canvas.getContext('2d');
        const activeNames = masterList.filter(s => s.active); const center = 500;
        ctx.clearRect(0,0,1000,1000); if(activeNames.length === 0) return;
        const slice = (Math.PI * 2) / activeNames.length;
        activeNames.forEach((s, i) => {
            ctx.fillStyle = colors[i % colors.length]; ctx.beginPath(); ctx.moveTo(center, center);
            ctx.arc(center, center, 490, i * slice, (i+1) * slice); ctx.fill();
            ctx.strokeStyle = isDarkMode ? "#2c2c2c" : "white"; ctx.lineWidth = 4; ctx.stroke();
            ctx.save(); ctx.translate(center, center); ctx.rotate(i * slice + slice/2);
            ctx.textAlign = "right"; ctx.fillStyle = "white"; ctx.font = "bold 40px Arial";
            ctx.fillText(s.name, 450, 15); ctx.restore();
        });
    }

    function spin() {
        const activeNames = masterList.filter(s => s.active); if(!activeNames.length) return;
        if(!pool.length) resetPool();
        const btn = document.getElementById('spinBtn'); btn.disabled = true;
        const winnerName = pool[Math.floor(Math.random() * pool.length)];
        const visualIdx = activeNames.findIndex(s => s.name === winnerName);
        const deg = 360 / activeNames.length;
        rotation += (360 * 8) + (270 - (visualIdx * deg) - (deg/2) - (rotation % 360));
        document.getElementById('wheelCanvas').style.transform = `rotate(${rotation}deg)`;
        setTimeout(() => {
            pool.splice(pool.indexOf(winnerName), 1);
            document.getElementById('winnerName').innerText = `✨ ${winnerName} ✨`;
            document.getElementById('winnerOverlay').classList.add('show');
            btn.disabled = false; render();
            winnerTimer = setTimeout(dismissWinner, 15000);
        }, 10000);
    }
    function dismissWinner() { document.getElementById('winnerOverlay').classList.remove('show'); if(winnerTimer) clearTimeout(winnerTimer); }

    init(); window.addEventListener('resize', draw);
</script>
</body>
</html>
